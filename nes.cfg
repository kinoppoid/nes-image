MEMORY {
    ZP:     start = $00,   size = $100,  type = rw, define = yes;
    RAM:    start = $0200, size = $0600, type = rw;
    WRAM:   start = $6000, size = $2000, type = rw;
    HEADER: start = $0000, size = $10,   type = ro, file = %O, fill = yes, fillval = $00;
    PRG:    start = $8000, size = $8000, type = ro, file = %O, fill = yes, fillval = $FF;
    # No CHR region: using CHR-RAM (iNES header CHR bank count = 0)
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    BSS:      load = RAM,    type = bss;
    HEADER:   load = HEADER, type = ro;
    STARTUP:  load = PRG,    type = ro, start = $8000;
    CODE:     load = PRG,    type = ro;
    RODATA:   load = PRG,    type = ro;
    DATA:     load = PRG,    type = ro;
    VECTORS:  load = PRG,    type = ro, start = $FFFA;
    # No CHARS segment: CHR tile data is decompressed into PPU CHR-RAM at runtime
}
